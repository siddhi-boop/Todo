<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busy Day - ToDo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <i class="fa-regular fa-square-check"></i> Busy Day
    </div>

    <div class="dashboard">
        <div class="header-row">
            <div>
                <h1 class="welcome-text">Hello, Emily!</h1>
                <button class="btn-add-list" id="addListBtn">
                    <i class="fa-solid fa-plus"></i> Add new List
                </button>
            </div>
            <div class="meta-info">
                <div>Tue, Feb 27</div>
                <div style="margin-top: 4px;"><i class="fa-solid fa-sun"></i> 67° C</div>
            </div>
        </div>

        <div class="control-panel">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="globalSearch" placeholder="Search tasks across all lists...">
            </div>
        </div>

        <div class="lists-grid" id="listsGrid">
            </div>
    </div>

    <footer>
        &copy; 2026 Busy Day by ScriptedSprouts
    </footer>

    <script src="script.js"></script>
</body>
</html>
